version: "3.8"

services:
  auth-db: ## Postgres DB for auth-service
    image: bitnami/postgresql:latest
    networks:
      - nest
    volumes:
      - auth_db_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=postgres
    ports:
      - "5433:5432"

  user-db: ## Postgres DB for user-service
    image: bitnami/postgresql:latest
    networks:
      - nest
    volumes:
      - user_db_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=postgres
    ports:
      - "5434:5432"

  news-db:
    image: bitnami/postgresql:latest
    networks:
      - nest
    volumes:
      - news_db_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=news_db
    ports:
      - "5435:5432"

  subscription-db:
    image: bitnami/postgresql:latest
    networks:
      - nest
    volumes:
      - subscription_db_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=subscription_db
    ports:
      - "5436:5432"

  kong: ## Kong API Gateway
    image: kong/kong:3.8
    networks:
      - nest
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001, 0.0.0.0:8444 ssl
    volumes:
      - ./config/kong/kong.yml:/kong/declarative/kong.yml
    ports:
      - "8000:8000" # Proxy port
      - "8443:8443" # Proxy SSL port
      - "18001:8001" # Admin port
      - "18444:8444" # Admin SSL port
    depends_on:
      - auth-db
      - user-db
      - news-db

  kafka:
    image: bitnami/kafka:latest
    networks:
      - nest
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    ports:
      - "9092:9092"

networks:
  nest:
    driver: bridge

volumes:
  auth_db_data:
  user_db_data:
  news_db_data:
  subscription_db_data:
